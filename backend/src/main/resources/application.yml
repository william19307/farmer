spring:
  profiles:
    active: dev
  application:
    name: farmer-backend
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /

knife4j:
  enable: true
  setting:
    language: zh_cn
